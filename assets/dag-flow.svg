<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="230" viewBox="0 0 1000 230" role="img" aria-labelledby="title desc">
  <title id="title">Evidence-gated multi-agent DAG</title>
  <desc id="desc">Animated flow from intent through routing, parallel agents, evidence, and verification</desc>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
  </defs>
  <style>
    .label{font:600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.4px;fill:#cbd5e1;text-anchor:middle}
    .sub{font:10px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#64748b;text-anchor:middle}
    .edge{fill:none;stroke:#475569;stroke-width:1.5;marker-end:url(#arrow)}
    .dash{fill:none;stroke:url(#edge);stroke-width:2;stroke-dasharray:4 10;animation:dash 3s linear infinite}
    .node{fill:#0f172a;stroke:#334155;stroke-width:1.5}
    .ring{fill:none;stroke:#22d3ee;stroke-width:1.5;opacity:.7}
    @keyframes dash{to{stroke-dashoffset:-56}}
    @keyframes breathe{0%,100%{opacity:.35}50%{opacity:1}}
    .breathe{animation:breathe 2.4s ease-in-out infinite}
  </style>

  <path class="edge" d="M115 115H245"/>
  <path class="edge" d="M335 115C385 115 385 48 435 48"/>
  <path class="edge" d="M335 115H435"/>
  <path class="edge" d="M335 115C385 115 385 182 435 182"/>
  <path class="edge" d="M555 48C610 48 610 115 665 115"/>
  <path class="edge" d="M555 115H665"/>
  <path class="edge" d="M555 182C610 182 610 115 665 115"/>
  <path class="edge" d="M755 115H885"/>

  <path class="dash" d="M115 115H245M335 115C385 115 385 48 435 48M335 115H435M335 115C385 115 385 182 435 182M555 48C610 48 610 115 665 115M555 115H665M555 182C610 182 610 115 665 115M755 115H885"/>

  <g>
    <rect class="node" x="25" y="78" width="90" height="74" rx="16"/>
    <circle class="ring breathe" cx="70" cy="106" r="9"/>
    <text class="label" x="70" y="134">INTENT</text>
    <text class="sub" x="70" y="146">goal</text>
  </g>
  <g>
    <rect class="node" x="245" y="78" width="90" height="74" rx="16"/>
    <path d="M278 103h24M282 97l-6 6 6 6M298 97l6 6-6 6" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <text class="label" x="290" y="134">ROUTER</text>
    <text class="sub" x="290" y="146">scope</text>
  </g>

  <g>
    <rect class="node" x="435" y="18" width="120" height="60" rx="14"/>
    <circle class="breathe" cx="455" cy="38" r="5" fill="#22d3ee"/>
    <text class="label" x="495" y="50">AGENT 01</text>
    <text class="sub" x="495" y="66">build</text>
  </g>
  <g>
    <rect class="node" x="435" y="85" width="120" height="60" rx="14"/>
    <circle class="breathe" cx="455" cy="105" r="5" fill="#a78bfa" style="animation-delay:.8s"/>
    <text class="label" x="495" y="117">AGENT 02</text>
    <text class="sub" x="495" y="133">analyze</text>
  </g>
  <g>
    <rect class="node" x="435" y="152" width="120" height="60" rx="14"/>
    <circle class="breathe" cx="455" cy="172" r="5" fill="#34d399" style="animation-delay:1.6s"/>
    <text class="label" x="495" y="184">AGENT 03</text>
    <text class="sub" x="495" y="200">verify</text>
  </g>

  <g>
    <rect class="node" x="665" y="78" width="90" height="74" rx="16"/>
    <path d="M696 101h28v22h-28zM701 96h18" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text class="label" x="710" y="134">EVIDENCE</text>
    <text class="sub" x="710" y="146">ledger</text>
  </g>
  <g>
    <rect class="node" x="885" y="78" width="90" height="74" rx="16"/>
    <circle class="ring breathe" cx="930" cy="106" r="12" stroke="#34d399"/>
    <path d="M924 106l4 4 8-9" fill="none" stroke="#34d399" stroke-width="2"/>
    <text class="label" x="930" y="134">VERIFIED</text>
    <text class="sub" x="930" y="146">ship</text>
  </g>

  <circle r="3" fill="#22d3ee" filter="url(#glow)"><animateMotion dur="2.8s" repeatCount="indefinite" path="M115 115H245"/></circle>
  <circle r="3" fill="#a78bfa" filter="url(#glow)"><animateMotion dur="3.2s" begin="-.8s" repeatCount="indefinite" path="M335 115C385 115 385 48 435 48"/></circle>
  <circle r="3" fill="#34d399" filter="url(#glow)"><animateMotion dur="3.2s" begin="-1.6s" repeatCount="indefinite" path="M555 182C610 182 610 115 665 115"/></circle>
  <circle r="3" fill="#22d3ee" filter="url(#glow)"><animateMotion dur="2.8s" begin="-2s" repeatCount="indefinite" path="M755 115H885"/></circle>
</svg>
