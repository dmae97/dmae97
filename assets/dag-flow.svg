<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#787774"/>
    </marker>
  </defs>
  <style>
    .node { fill: #111; stroke: #111; stroke-width: 1.5; }
    .edge { stroke: #787774; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .pulse { fill: #787774; opacity: 0; }
    @keyframes flow {
      0% { opacity: 0; transform: translate(0, 0); }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
    .p1 { animation: flow 2.4s ease-in-out infinite; }
    .p2 { animation: flow 2.4s ease-in-out 0.8s infinite; }
    .p3 { animation: flow 2.4s ease-in-out 1.6s infinite; }
    @keyframes fade {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    .node { animation: fade 3s ease-in-out infinite; }
    .n1 { animation-delay: 0s; }
    .n2 { animation-delay: 1s; }
    .n3 { animation-delay: 2s; }
  </style>
  <!-- edges -->
  <line class="edge" x1="80" y1="80" x2="260" y2="80"/>
  <line class="edge" x1="320" y1="80" x2="500" y2="80"/>
  <!-- nodes -->
  <circle class="node n1" cx="80" cy="80" r="10"/>
  <circle class="node n2" cx="290" cy="80" r="10"/>
  <circle class="node n3" cx="520" cy="80" r="10"/>
  <!-- pulse dots -->
  <circle class="pulse p1" cx="80" cy="80" r="3"/>
  <circle class="pulse p2" cx="80" cy="80" r="3"/>
  <circle class="pulse p3" cx="80" cy="80" r="3"/>
  <!-- labels -->
  <text x="290" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#787774">DAG orchestration</text>
</svg>