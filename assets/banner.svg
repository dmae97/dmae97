<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(120,117,116,0)"/>
      <stop offset="50%" stop-color="rgba(120,117,116,0.6)"/>
      <stop offset="100%" stop-color="rgba(120,117,116,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  
  <!-- circuit lines -->
  <g stroke="url(#line)" stroke-width="1" fill="none">
    <path d="M0,140 Q200,160 400,140 Q600,120 800,140"/>
    <path d="M0,150 Q200,170 400,150 Q600,130 800,150"/>
    <path d="M0,130 Q200,150 400,130 Q600,110 800,130"/>
  </g>
  
  <!-- animated dots -->
  <circle r="2" fill="#787774">
    <animateMotion dur="4s" repeatCount="indefinite" path="M0,140 Q200,160 400,140 Q600,120 800,140"/>
  </circle>
  <circle r="2" fill="#787774">
    <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite" path="M0,150 Q200,170 400,150 Q600,130 800,150"/>
  </circle>
  <circle r="2" fill="#787774">
    <animateMotion dur="4s" begin="2.6s" repeatCount="indefinite" path="M0,130 Q200,150 400,130 Q600,110 800,130"/>
  </circle>
  
  <!-- text -->
  <text x="400" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="48" font-weight="600" fill="#f5f5f5" letter-spacing="-0.04em">dmae</text>
  <text x="400" y="115" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#787774" letter-spacing="0.12em">MULTI-AGENT LLM ORCHESTRATION</text>
</svg>